# Render Blueprint — provisions the Spring Boot backend + a managed Postgres.
# Deploy: push this file, then in the Render dashboard "New +" → "Blueprint" and
# point it at this repo. Render reads backend/Dockerfile and creates both resources.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio
    plan: free

services:
  - type: web
    name: portfolio-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Actuator health endpoint — Render gates traffic on this returning 200.
    healthCheckPath: /actuator/health
    envVars:
      # ── Database (auto-wired from the managed Postgres above) ──────────────
      - key: DB_HOST
        fromDatabase: { name: portfolio-db, property: host }
      - key: DB_PORT
        fromDatabase: { name: portfolio-db, property: port }
      - key: DB_NAME
        fromDatabase: { name: portfolio-db, property: database }
      - key: DB_USERNAME
        fromDatabase: { name: portfolio-db, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: portfolio-db, property: password }

      # ── Auth ───────────────────────────────────────────────────────────────
      # JWT signing key — Render generates a strong random value on first deploy.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_HOURS
        value: "8"
      # Admin login. Set these in the dashboard (sync:false = not stored in git).
      # ADMIN_PASSWORD_HASH is a BCrypt hash, NOT the plaintext password.
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false

      # ── CORS ─────────────────────────────────────────────────────────────
      # The Vercel frontend's public origin, e.g. https://your-portfolio.vercel.app
      # (no trailing slash). Set after the frontend URL is known.
      - key: CORS_ALLOWED_ORIGIN
        sync: false

      # ── AI assistant: chatbot + RAG + recruiter (Google Gemini) ───────────
      # The only secret is GEMINI_API_KEY — leave it unset to disable all AI features
      # (chat/recruiter then return 503). The rest are non-secret tuning knobs with
      # sensible defaults committed here; change them in git or the dashboard.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash      # or gemini-2.5-flash-lite (more daily quota) / gemini-2.5-pro
      - key: GEMINI_API_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: GEMINI_EMBED_MODEL
        value: gemini-embedding-001
      # Must match the embedding column width (vector(768)); don't change after indexing.
      - key: GEMINI_EMBED_DIM
        value: "768"
      # Hard daily ceiling on AI calls (chat + recruiter); keep below the free-tier RPD.
      - key: AI_DAILY_REQUEST_CAP
        value: "200"

      # ── Contact-form email delivery (Resend REST). Leave key unset to disable. ──
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: RESEND_API_URL
        value: https://api.resend.com/emails

      # ── OAuth2 admin login (Google + GitHub) — ALL OPTIONAL ────────────────
      # App boots password-only if these are unset. Registrations activate only when a
      # provider's client-id is present. OAUTH_ALLOWED_EMAILS is FAIL-CLOSED. Full steps
      # + redirect-URI table in docs/DEPLOY.md §5.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: OAUTH_ALLOWED_EMAILS
        sync: false
      # SPA origin to redirect back to after sign-in (the Vercel URL in prod).
      - key: APP_FRONTEND_URL
        sync: false
      # Prod is HTTPS, so the OAuth-request cookie must carry the Secure flag.
      - key: APP_COOKIE_SECURE
        value: "true"

      # ── Secure Document Vault ("Drive") — ALL OPTIONAL. The vault stays OFF until
      #    STORAGE_ENDPOINT is set, so leaving these blank is safe. Recommended prod:
      #    Cloudflare R2 (storage) + Resend SMTP (email). Full steps in docs/DEPLOY.md. ──
      # Object storage (S3-compatible). R2 endpoint: https://<accountid>.r2.cloudflarestorage.com
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      # R2 uses "auto"; AWS S3 uses its real region (e.g. us-east-1).
      - key: STORAGE_REGION
        sync: false
      # AES-256 master key (KEK) = base64 of 32 bytes: openssl rand -base64 32
      # SET ONCE AND NEVER CHANGE — rotating it makes every stored file undecryptable.
      # Do NOT use generateValue (Render's random value isn't a base64 32-byte key).
      - key: DRIVE_MASTER_KEY
        sync: false
      # This service's own public URL — used to build emailed download links.
      - key: DRIVE_PUBLIC_BASE_URL
        sync: false
      # Owner's fixed address: "send to my email" destination + sensitive-file OTP.
      - key: DRIVE_NOTIFY_EMAIL
        sync: false
      # SMTP. Resend: MAIL_HOST=smtp.resend.com, MAIL_PORT=587, MAIL_USERNAME=resend,
      # MAIL_PASSWORD=<Resend API key>, MAIL_FROM=<verified sender>. (auth/STARTTLS default true.)
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
