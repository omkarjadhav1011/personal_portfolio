services:

  # ── Database ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    environment:
      POSTGRES_USER: portfolio
      # Strong password injected from env/.env; falls back to a dev value locally only.
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portfolio}
      POSTGRES_DB: portfolio
    ports:
      # Bind to loopback ONLY so the DB is reachable by local dev tools but never from
      # the host's external network interfaces. Drop this mapping entirely in production
      # (the backend reaches Postgres over the internal compose network on 5432).
      - "127.0.0.1:5433:5432"
    volumes:
      - portfolio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: portfolio-backend
    ports:
      - "8081:8081"
    environment:
      # Override the localhost default so the backend reaches the postgres service.
      DATABASE_URL: jdbc:postgresql://postgres:5432/portfolio
      # Must match the postgres password above.
      DB_PASSWORD: ${DB_PASSWORD:-portfolio}
      # Allow requests originating from the nginx frontend container.
      CORS_ALLOWED_ORIGIN: http://localhost:3000
      # JWT signing key — REQUIRED. Read from the host env or the repo-root .env file.
      # `:?` aborts `docker compose up` with an error if it is not set, so the backend
      # can never start with a missing/known signing key.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (see .env / openssl rand -base64 48)}
      # Admin login — REQUIRED (no in-file fallback). Set in .env / host env.
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME must be set}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH must be set (BCrypt hash)}
    volumes:
      # Persist uploaded files (avatars, etc.) across container restarts.
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: portfolio-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  portfolio_pgdata:
  uploads_data:
