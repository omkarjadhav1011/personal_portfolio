server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;


    # ── Security headers (applied to every response) ────────────────────────────
    add_header X-Frame-Options        "DENY"        always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # SPA CSP: same-origin only; allow inline styles (Tailwind/Framer) + data: images.
    # connect-src 'self' covers the same-origin /api proxy. No framing of this app.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # SPA: route unknown paths to index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Spring Boot backend container
    location /api/ {
        proxy_pass         http://backend:8081/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy uploaded file serving
    location /uploads/ {
        proxy_pass       http://backend:8081/uploads/;
        proxy_set_header Host $host;
    }
}
