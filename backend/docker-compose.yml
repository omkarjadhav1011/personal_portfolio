services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portfolio}
      POSTGRES_DB: portfolio
    ports:
      # Loopback-only: reachable by local dev tools, never from external interfaces.
      # Host 5433 -> container 5432 (host 5432 is already in use locally).
      - "127.0.0.1:5433:5432"
    volumes:
      - portfolio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    # S3-compatible object storage for the Secure Document Vault ("Drive").
    # Bytes (file ciphertext) live here, never in Postgres. Switching to
    # Cloudflare R2 / AWS S3 in prod is an env-var change only (no code).
    image: minio/minio
    container_name: portfolio-minio
    command: server /data --console-address ":9001"
    environment:
      # Root creds double as the S3 access/secret keys the app uses. Override
      # via env in any shared environment; these fallbacks are local-dev only.
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    ports:
      # Loopback-only, matching the Postgres convention: reachable by local
      # dev tools, never from external interfaces. 9000 = S3 API, 9001 = console.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - portfolio_miniodata:/data
    # No container healthcheck: the minio image lacks curl and has no
    # preconfigured `mc` alias, so a probe would falsely report "unhealthy".
    # Nothing here depends on MinIO's health; liveness is checked host-side
    # (GET 127.0.0.1:9000/minio/health/live) and the app bootstraps the bucket.

  frontend:
    # Vite dev server (hot-reload) on 5173. Source is bind-mounted; the anonymous
    # node_modules volume preserves the image's Linux-built deps over the host's.
    # The backend runs on the HOST (via `mvn spring-boot:run`), so the dev proxy
    # targets host.docker.internal:8081 rather than a backend container.
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: portfolio-frontend
    command: npm run dev -- --host
    environment:
      VITE_PROXY_TARGET: http://host.docker.internal:8081
      VITE_USE_POLLING: "1"
    ports:
      # Loopback-only, matching the Postgres/MinIO convention.
      - "127.0.0.1:5173:5173"
    volumes:
      - ../frontend:/app
      # Anonymous volume: keep the container's node_modules, not the host's.
      - /app/node_modules
    extra_hosts:
      # Lets the container resolve the host (needed on Linux; harmless on Desktop).
      - "host.docker.internal:host-gateway"

volumes:
  portfolio_pgdata:
  portfolio_miniodata:
