spring:
  application:
    name: portfolio-backend
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  datasource:
    # Prod (Render): the managed Postgres injects DB_HOST/DB_PORT/DB_NAME/DB_USERNAME/
    # DB_PASSWORD, which compose the JDBC URL below. Docker-compose sets DATABASE_URL
    # directly (takes precedence); local dev falls back to the host:5433 Postgres.
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:portfolio}}
    username: ${DB_USERNAME:portfolio}
    password: ${DB_PASSWORD:portfolio}
  jpa:
    hibernate:
      # Schema is owned by Flyway (db/migration). Hibernate only validates entities against it.
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  # Render injects PORT at runtime; locally and in docker-compose this falls back to 8081.
  port: ${PORT:8081}
  shutdown: graceful
  # Honor X-Forwarded-* behind Render's TLS proxy so the OAuth2 redirect-uri is built with
  # https (and the public host), not the internal http://host:port. A mismatch here is the
  # #1 cause of OAuth redirect-uri failures.
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  # API docs & Swagger UI are OFF by default (don't expose the API surface in prod).
  # Enable for local dev by setting SWAGGER_ENABLED=true.
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html

# JWT — REQUIRED environment variable in EVERY environment (no in-file fallback).
# JwtService fails startup if JWT_SECRET is unset or < 32 bytes. Generate one with:
#   openssl rand -base64 48
JWT_EXPIRY_HOURS: 8
# Lifetime of the interim PRE_AUTH token issued between the first factor and MFA verify.
JWT_PREAUTH_MINUTES: 5

# TOTP MFA — no new env var required. The at-rest encryption key for the TOTP secret is
# derived from JWT_SECRET (domain-separated), and MFA is OPTIONAL at startup: until the owner
# enrolls (admin_mfa row with enabled=true), login behaves exactly as before.

# CORS — Vite dev server runs on 5173. Override with CORS_ALLOWED_ORIGIN env var in production.
CORS_ALLOWED_ORIGIN: http://localhost:5173

# Admin credentials — REQUIRED env vars (no in-file fallback). AuthController rejects
# all logins when ADMIN_USERNAME / ADMIN_PASSWORD_HASH are unset. ADMIN_PASSWORD_HASH is
# a BCrypt hash (cost 12), NOT plaintext. Set both via env / .env in every environment.

# Secure Document Vault ("Drive") — S3-compatible object storage. The subsystem is
# wired in code (DriveStorageConfig) ONLY when STORAGE_ENDPOINT is set, so the app boots
# without it (non-drive local dev / tests). Bytes are stored as ciphertext (envelope
# encryption, a later phase); a MinIO + Postgres dump yields only ciphertext.
# Local dev: `docker compose -f backend/docker-compose.yml up -d minio`, then set in .env:
#   STORAGE_ENDPOINT     # e.g. http://localhost:9000 (MinIO); R2/S3 URL in prod
#   STORAGE_BUCKET       # e.g. portfolio-drive (defaults to portfolio-drive if unset)
#   STORAGE_ACCESS_KEY   # MinIO root user / S3 access key (compose default: minioadmin)
#   STORAGE_SECRET_KEY   # MinIO root password / S3 secret key (compose default: minioadmin)
#   STORAGE_REGION       # e.g. us-east-1 (MinIO ignores it; AWS S3 / R2 require it)
#   DRIVE_MASTER_KEY     # base64 32-byte AES-256 master key (KEK) for envelope encryption.
#                        # REQUIRED when the vault is enabled — startup fails fast if it is unset
#                        # or not 32 bytes. Generate one with: openssl rand -base64 32
# The bucket is auto-created at startup (StorageBucketInitializer); a down MinIO logs an
# error but does NOT fail app startup.

# OAuth2 login (Google + GitHub) — ALL OPTIONAL. Registrations are built in code
# (OAuth2ClientConfig) only when a provider's client-id is present, so the app boots
# password-only with none of these set (local/test). Set per environment to enable:
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET   — Google Cloud OAuth client
#   GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET   — GitHub OAuth App (scope read:user,user:email)
#   OAUTH_ALLOWED_EMAILS — comma-separated allowlist; ONLY these emails may enter (fail-closed)
#   APP_FRONTEND_URL     — SPA origin for the post-login redirect
#                          (dev http://localhost:5173 / compose http://localhost:3000 / Vercel prod)
#   APP_COOKIE_SECURE    — true in prod (HTTPS) so the auth-request cookie carries the Secure flag
# Provider redirect URIs must point at {backend}/login/oauth2/code/{google|github} (see DEPLOY.md).
