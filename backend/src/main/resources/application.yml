spring:
  application:
    name: portfolio-backend
  datasource:
    # JDBC URL; defaults to the local docker-compose Postgres on host port 5433.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/portfolio}
    username: ${DATABASE_USERNAME:portfolio}
    password: ${DATABASE_PASSWORD:portfolio}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8081

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
