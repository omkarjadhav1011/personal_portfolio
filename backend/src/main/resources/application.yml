spring:
  application:
    name: portfolio-backend
  datasource:
    # JDBC URL; defaults to the local docker-compose Postgres on host port 5433.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/portfolio}
    username: ${DATABASE_USERNAME:portfolio}
    password: ${DATABASE_PASSWORD:portfolio}
  jpa:
    hibernate:
      # Schema is owned by Flyway (db/migration). Hibernate only validates entities against it.
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8081
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
